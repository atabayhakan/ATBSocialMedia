name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıklar
        run: npm ci

      # Üretim bağımlılıklarında kritik zafiyet varsa derlemeyi durdur.
      # (dev/build zinciri ve düşük seviyeler hariç — yalnız gerçek runtime riski.)
      - name: Güvenlik denetimi (üretim, kritik)
        run: npm audit --omit=dev --audit-level=critical

      - name: Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Lint
        run: npm run lint

      - name: Testler (mock mod)
        run: npm test

      - name: Build
        run: npm run build
