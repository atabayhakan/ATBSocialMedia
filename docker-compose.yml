version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atb
      POSTGRES_PASSWORD: atb
      POSTGRES_DB: atbsocialmedia
    ports:
      # Sadece localhost — Docker, ufw'yi bypass ettiği için 0.0.0.0'a bağlamak DB'yi internete açar
      - '127.0.0.1:5432:5432'
    volumes:
      - atb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atb -d atbsocialmedia']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - atb_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  atb_postgres_data:
  atb_redis_data:
